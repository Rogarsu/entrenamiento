<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Vida · Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#202028;
  --border:#252530;--border2:#2e2e3e;
  --amber:#f59e0b;--amber2:#fbbf24;--amber-dim:#78530d;
  --cyan:#06b6d4;--cyan2:#22d3ee;--cyan-dim:#0e4a57;
  --red:#ef4444;--green:#22c55e;--green-dim:#14532d;
  --text:#e8e8f0;--text2:#9999b0;--text3:#5a5a6e;
  --font-head:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:14px;line-height:1.5}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:56px;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 20px;gap:16px;
}
.nav-logo{
  font-family:var(--font-head);font-weight:800;font-size:20px;letter-spacing:0.04em;
  color:var(--amber);text-transform:uppercase;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.nav-logo span{color:var(--text2);font-weight:400;font-size:13px;text-transform:none;letter-spacing:0}
.nav-modules{display:flex;gap:4px;margin-left:auto}
.nav-mod{
  padding:6px 14px;border-radius:6px;font-family:var(--font-head);font-weight:600;
  font-size:13px;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;
  border:1px solid transparent;transition:all .2s;color:var(--text2);background:transparent;
}
.nav-mod.active{color:var(--amber);border-color:var(--amber);background:rgba(245,158,11,0.08)}
.nav-mod:not(.active):hover{color:var(--text);border-color:var(--border2)}
.nav-mod.locked{opacity:0.3;cursor:not-allowed;font-size:11px}

/* MAIN LAYOUT */
.main{padding-top:56px;display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto;
}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);
  font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--text3);font-weight:600}
.phase-section{border-bottom:1px solid var(--border)}
.phase-header{
  padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;
  font-family:var(--font-head);font-weight:700;font-size:14px;letter-spacing:0.04em;
  text-transform:uppercase;transition:background .15s;user-select:none;
}
.phase-header:hover{background:var(--bg3)}
.phase-badge{
  margin-left:auto;font-size:11px;font-family:var(--font-mono);
  padding:2px 8px;border-radius:10px;
}
.ph1 .phase-badge{background:rgba(245,158,11,0.15);color:var(--amber)}
.ph2 .phase-badge{background:rgba(6,182,212,0.15);color:var(--cyan)}
.ph3 .phase-badge{background:rgba(239,68,68,0.15);color:var(--red)}
.ph4 .phase-badge{background:rgba(34,197,94,0.15);color:var(--green)}
.ph1{color:var(--amber)}.ph2{color:var(--cyan)}.ph3{color:var(--red)}.ph4{color:var(--green)}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ph1 .phase-dot{background:var(--amber)}.ph2 .phase-dot{background:var(--cyan)}
.ph3 .phase-dot{background:var(--red)}.ph4 .phase-dot{background:var(--green)}
.session-list{overflow:hidden}
.session-item{
  padding:10px 16px 10px 32px;cursor:pointer;display:flex;align-items:center;gap:10px;
  border-left:3px solid transparent;transition:all .15s;
}
.session-item:hover{background:var(--bg3);border-left-color:var(--border2)}
.session-item.active{background:var(--bg4);border-left-color:var(--amber)}
.session-item.done-item{opacity:0.6}
.s-num{font-family:var(--font-mono);font-size:11px;color:var(--text3);min-width:28px;font-weight:600}
.s-title{font-size:12px;color:var(--text2);line-height:1.3;flex:1}
.session-item.active .s-title{color:var(--text)}
.s-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.s-check.done{background:var(--green-dim);border-color:var(--green);color:var(--green)}

/* CONTENT */
.content{padding:24px;overflow-y:auto;max-width:900px}

/* PROGRESS BAR (top) */
.progress-bar-container{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px}
.pb-label{font-family:var(--font-head);font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);white-space:nowrap}
.pb-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--amber),var(--amber2));transition:width 0.5s}
.pb-pct{font-family:var(--font-mono);font-size:14px;color:var(--amber);font-weight:600;white-space:nowrap}

/* SESSION HEADER */
.session-header{margin-bottom:20px}
.session-num{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.session-title{font-family:var(--font-head);font-size:32px;font-weight:800;line-height:1.1;letter-spacing:0.02em;color:var(--text);margin-bottom:10px}
.session-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-badge{
  padding:4px 12px;border-radius:4px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;
  font-weight:600;text-transform:uppercase;border:1px solid;
}
.mb-phase1{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:var(--amber)}
.mb-phase2{background:rgba(6,182,212,0.1);border-color:rgba(6,182,212,0.3);color:var(--cyan)}
.mb-phase3{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.mb-phase4{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:var(--green)}
.mb-int-low{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:var(--green)}
.mb-int-med{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3);color:var(--amber)}
.mb-int-high{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.mb-gray{background:rgba(90,90,110,0.15);border-color:rgba(90,90,110,0.3);color:var(--text2)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:20px}
.tab-btn{
  padding:10px 20px;font-family:var(--font-head);font-size:14px;letter-spacing:0.06em;
  text-transform:uppercase;font-weight:700;cursor:pointer;border:none;background:none;
  color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;
}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.tab-btn:hover:not(.active){color:var(--text2)}
.tab-content{display:none}.tab-content.active{display:block}

/* SECTION CARDS */
.section-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;margin-bottom:14px}
.sc-label{
  font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text3);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.sc-label::after{content:'';flex:1;height:1px;background:var(--border)}
.info-item{padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.info-item:last-child{border-bottom:none;padding-bottom:0}
.info-bullet{color:var(--amber);margin-top:1px;flex-shrink:0;font-size:11px}
.info-text{flex:1}
.info-clickable{cursor:pointer;transition:background .15s;border-radius:4px;padding-left:4px;padding-right:4px;margin-left:-4px;margin-right:-4px}
.info-clickable:hover{background:rgba(245,158,11,0.06);color:var(--text)}
.info-clickable:hover .img-icon{color:var(--amber)}

/* EXERCISE TABLE */
.ex-table-container{overflow-x:auto;margin-bottom:14px}
.block-title{
  font-family:var(--font-head);font-size:16px;font-weight:700;letter-spacing:0.04em;
  color:var(--text);margin:16px 0 10px;display:flex;align-items:center;gap:8px;
}
.block-title::before{content:'▶';color:var(--amber);font-size:10px}
.block-note{font-size:12px;color:var(--cyan);background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-family:var(--font-mono)}
.ex-table{width:100%;border-collapse:collapse;font-size:13px}
.ex-table th{
  background:rgba(255,255,255,0.03);padding:9px 12px;text-align:left;
  font-family:var(--font-head);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text3);border-bottom:1px solid var(--border2);white-space:nowrap;
}
.ex-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4}
.ex-table tr:last-child td{border-bottom:none}
.ex-table tr:hover td{background:rgba(255,255,255,0.02)}
.ex-name{
  color:var(--text);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:color .2s;
}
.ex-name:hover{color:var(--amber)}
.ex-name:hover .img-icon{color:var(--amber)}
.img-icon{font-size:12px;color:var(--text3);transition:color .2s;flex-shrink:0}
.ex-muscle{color:var(--text3);font-size:11px;font-family:var(--font-mono);margin-top:2px}
.ex-sets,.ex-reps,.ex-rest{font-family:var(--font-mono);color:var(--text2);font-size:12px;white-space:nowrap}
.ex-notes{color:var(--cyan2);font-size:12px;font-style:italic}
.ex-weight{color:var(--amber);font-size:12px;font-family:var(--font-mono)}

/* MARK DONE */
.mark-section{border-top:1px solid var(--border2);padding-top:16px;margin-top:4px}
.mark-btn{
  display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;
  font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:0.06em;
  text-transform:uppercase;cursor:pointer;border:1.5px solid var(--green);
  background:rgba(34,197,94,0.08);color:var(--green);transition:all .2s;
}
.mark-btn:hover{background:rgba(34,197,94,0.15)}
.mark-btn.already-done{border-color:var(--text3);background:none;color:var(--text3);cursor:default}

/* LOG FORM */
.log-form{display:none;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-top:12px}
.log-form.open{display:block}
.log-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.log-field{display:flex;flex-direction:column;gap:5px}
.log-label{font-size:11px;color:var(--text3);font-family:var(--font-mono);letter-spacing:0.06em;text-transform:uppercase}
.log-input{
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);padding:7px 10px;font-size:13px;font-family:var(--font-body);
  transition:border-color .2s;
}
.log-input:focus{outline:none;border-color:var(--amber)}
.log-input-full{grid-column:1/-1}
textarea.log-input{resize:vertical;min-height:60px}
.log-actions{display:flex;gap:8px}
.btn-save{
  padding:9px 20px;border-radius:7px;font-family:var(--font-head);font-size:14px;
  font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:none;
  background:var(--green);color:white;transition:all .2s;
}
.btn-save:hover{filter:brightness(1.1)}
.btn-cancel{
  padding:9px 16px;border-radius:7px;font-family:var(--font-head);font-size:14px;
  font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border2);background:none;color:var(--text2);transition:all .2s;
}
.btn-cancel:hover{border-color:var(--text2)}

/* EXERCISE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.ex-modal{
  background:var(--bg3);border:1px solid var(--border2);border-radius:14px;
  max-width:520px;width:100%;padding:0;overflow:hidden;
}
.ex-modal-img{
  width:100%;height:220px;background:linear-gradient(135deg,var(--bg4) 0%,var(--bg2) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;border-bottom:1px solid var(--border2);
}
.ex-modal-img-placeholder{font-size:60px;opacity:0.15}
.ex-modal-img-text{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.ex-modal-img-soon{font-size:11px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--amber);padding:4px 12px;border-radius:20px;font-family:var(--font-mono);letter-spacing:0.06em}
.ex-modal-body{padding:20px 24px}
.ex-modal-name{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px}
.ex-modal-muscle{font-family:var(--font-mono);font-size:12px;color:var(--cyan);margin-bottom:4px}
.ex-modal-equip{font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-bottom:14px}
.ex-modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1}
.ex-modal-close:hover{color:var(--text)}
.ex-modal-wrapper{position:relative}

/* STATS PANEL */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px}
.stat-val{font-family:var(--font-head);font-size:32px;font-weight:800;color:var(--amber);line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--font-mono);letter-spacing:0.06em;text-transform:uppercase}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:0.2}
.empty-title{font-family:var(--font-head);font-size:20px;color:var(--text2)}
.empty-text{font-size:13px;color:var(--text3);max-width:300px}

/* PHASE INTRO */
.phase-intro{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:20px;margin-bottom:20px}
.pi-phase{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.pi-name{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:8px}
.pi-desc{font-size:13px;color:var(--text2);line-height:1.6}
.pi-stats{display:flex;gap:16px;margin-top:12px}
.pi-stat{display:flex;flex-direction:column;gap:2px}
.pi-stat-val{font-family:var(--font-mono);font-size:16px;font-weight:600}
.pi-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-mono)}

/* MOBILE */
@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-280px;top:56px;width:280px;height:calc(100vh - 56px);z-index:500;transition:left .3s;box-shadow:4px 0 20px rgba(0,0,0,0.5)}
  .sidebar.open{left:0}
  .content{padding:16px}
  .stats-row{grid-template-columns:1fr 1fr}
  .log-grid{grid-template-columns:1fr 1fr}
  .session-title{font-size:24px}
}
.mobile-menu{display:none;background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:16px}
@media(max-width:768px){.mobile-menu{display:block}}
</style>
</head>
<body>

<nav>
  <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
  <div class="nav-logo">
    ⚡ SistemaVida <span>· Entrenamiento Físico</span>
  </div>
  <div class="nav-modules">
    <button class="nav-mod active">🏋️ Físico</button>
    <button class="nav-mod locked" title="Próximamente">🧠 Mental</button>
    <button class="nav-mod locked" title="Próximamente">🥗 Nutrición</button>
    <button class="nav-mod locked" title="Próximamente">📈 Progreso</button>
  </div>
</nav>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="sidebarProgress">Cargando...</span>
    </div>
    <div id="phaseList"></div>
  </aside>

  <!-- CONTENT -->
  <main class="content" id="contentArea">
    <!-- STATS -->
    <div class="stats-row" id="statsRow"></div>
    
    <!-- PHASE INTRO -->
    <div id="phaseIntroBox"></div>

    <!-- SESSION DETAIL -->
    <div id="sessionDetail">
      <div class="empty-state">
        <div class="empty-icon">🏋️</div>
        <div class="empty-title">Selecciona una sesión</div>
        <div class="empty-text">Elige cualquier sesión del panel izquierdo para ver todos sus detalles.</div>
      </div>
    </div>
  </main>
</div>

<!-- EXERCISE MODAL -->
<div class="modal-overlay" id="exModal" onclick="if(event.target===this)closeExModal()">
  <div class="ex-modal-wrapper">
    <div class="ex-modal" id="exModalContent">
    </div>
    <button class="ex-modal-close" onclick="closeExModal()">✕</button>
  </div>
</div>

<script>
// ===== IMAGES =====
// Mapa de imágenes: key = id del ejercicio o keyword, valor = ruta
const EX_IMAGES = {
  'treadmill_walk':    'images/caminata_rapida.webp',
  'calf_unilateral':   'images/calf_unilateral.webp',
  'dead_bug':          'images/dead_bug.webp',
  'glute_bridge':      'images/glute_bridge.webp',
  'lunge_walk':        'images/lunge_walk.webp',
  'plank':             'images/plank.webp',
  'psoas_stretch':     'images/psoas_stretch.webp',
  'pigeon':            'images/paloma_gluteo.webp',
  'squat_goblet':      'images/Dumbbell-Goblet-Squat.webp',
  'rdl':               'images/peso muerto rumano.webp',
  'abduction_machine': 'images/Abducción cadera (máquina).webp',
  'bench_flat':        'images/Press de banca plano (barra).gif',
  'db_press_incline':  'images/Press inclinado (mancuernas).gif',
  'db_fly_flat':       'images/Apertura plana (mancuernas).gif',
  'dips_tricep':       'images/Fondos en banco (tríceps).gif',
  'tricep_pushdown':   'images/Extensión tríceps (cuerda-cable).gif',
  'overhead_ext_db':   'images/Extensión overhead (mancuerna).gif',
};
// Keywords para ejercicios de texto (pre/post) que no tienen id específico
const EX_IMAGES_KEYWORDS = [
  { keywords: ['caminata rápida', 'caminata rapida'], img: 'images/caminata_rapida.webp' },
  { keywords: ['movilidad tobillo', 'movilidad de tobillo', 'círculos de tobillo', 'circulos de tobillo'], img: 'images/movilidad_tobillo.webp' },
  { keywords: ['pantorrilla contra pared'], img: 'images/pantorrilla_pared.webp' },
  { keywords: ['apertura de cadera en cuclillas'], img: 'images/deep_squat_hip_opener.webp' },
  { keywords: ['isquiotibial con banda', 'isquiotibiales con cinta'], img: 'images/isquiotibial_banda.webp' },
  { keywords: ['rotación espinal', 'rotacion espinal', 'rotaciones de rodilla'], img: 'images/rotacion.webp' },
  { keywords: ['paloma', 'figura 4', 'piriforme'], img: 'images/paloma_gluteo.webp' },
  { keywords: ['desbloqueo psoas', 'estiramiento de psoas', 'psoas'], img: 'images/psoas_stretch.webp' },

// ===== STATE =====
let state = {
  logs: JSON.parse(localStorage.getItem('sv_logs') || '[]'),
  currentId: null,
  expandedPhases: [1, 2, 3, 4],
};

function saveState() {
  localStorage.setItem('sv_logs', JSON.stringify(state.logs));
}

function isDone(id) {
  return state.logs.some(l => l.sessionId === id);
}

function getLog(id) {
  return state.logs.find(l => l.sessionId === id);
}

// ===== PHASES =====
const PHASES = {
  1: { name: "Fase 1 — Adaptación", color: "amber", weeks: "Semanas 1-5", sessions: "20 sesiones",
       desc: "Aprende los patrones de movimiento, establece la base neuromuscular y comienza el hábito. Pesos moderados, técnica perfecta. Cardio: caminata rápida a walk-jog." },
  2: { name: "Fase 2 — Construcción", color: "cyan", weeks: "Semanas 6-12", sessions: "25 sesiones",
       desc: "Aumenta el volumen, introduce superseries y cargas progresivas. El cuerpo cambia visiblemente. Cardio: trote continuo hasta 30-35 min." },
  3: { name: "Fase 3 — Acondicionamiento", color: "red", weeks: "Semanas 13-18", sessions: "25 sesiones",
       desc: "Trisets, HIIT, cargas máximas. Primer 5K. La grasa abdominal cede ante el músculo construido. Cardio: 40-45 min de trote + intervalos." },
  4: { name: "Fase 4 — Rendimiento", color: "green", weeks: "Semanas 19-24", sessions: "20 sesiones",
       desc: "Fuerza máxima, potencia atlética, primer 10K. El cuerpo que querías al inicio. Base sólida para el maratón." },
};

// ===== BUILD SIDEBAR =====
function buildSidebar() {
  const container = document.getElementById('phaseList');
  const phases = [1,2,3,4];
  const phaseColors = {1:'ph1',2:'ph2',3:'ph3',4:'ph4'};
  
  container.innerHTML = phases.map(ph => {
    const pSessions = SESSIONS.filter(s => s.phase === ph);
    const donePh = pSessions.filter(s => isDone(s.id)).length;
    return `
    <div class="phase-section">
      <div class="phase-header ${phaseColors[ph]}" onclick="togglePhase(${ph})">
        <div class="phase-dot"></div>
        FASE ${ph}
        <span class="phase-badge">${donePh}/${pSessions.length}</span>
      </div>
      <div class="session-list" id="phase-list-${ph}" style="display:${state.expandedPhases.includes(ph)?'block':'none'}">
        ${pSessions.map(s => `
          <div class="session-item ${isDone(s.id)?'done-item':''} ${state.currentId===s.id?'active':''}" 
               id="si-${s.id}" onclick="loadSession(${s.id})">
            <div class="s-num">${String(s.id).padStart(2,'0')}</div>
            <div class="s-title">${s.name.split('—')[1]?.trim() || s.name}</div>
            <div class="s-check ${isDone(s.id)?'done':''}">${isDone(s.id)?'✓':''}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
  
  updateSidebarProgress();
}

function updateSidebarProgress() {
  const total = SESSIONS.length;
  const done = SESSIONS.filter(s => isDone(s.id)).length;
  document.getElementById('sidebarProgress').textContent = `${done} / ${total} sesiones completadas`;
}

function togglePhase(ph) {
  const el = document.getElementById(`phase-list-${ph}`);
  if (el.style.display === 'none') {
    el.style.display = 'block';
    if (!state.expandedPhases.includes(ph)) state.expandedPhases.push(ph);
  } else {
    el.style.display = 'none';
    state.expandedPhases = state.expandedPhases.filter(p => p !== ph);
  }
}

// ===== BUILD STATS =====
function buildStats() {
  const total = SESSIONS.length;
  const done = SESSIONS.filter(s => isDone(s.id)).length;
  const totalMin = state.logs.reduce((a,b) => a + (b.duration||0), 0);
  const avgEnergy = state.logs.length ? (state.logs.reduce((a,b) => a+(b.energy||0),0)/state.logs.length).toFixed(1) : '--';
  
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${done}</div>
      <div class="stat-label">Sesiones completadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${done?Math.round(done/total*100):0}%</div>
      <div class="stat-label">Progreso total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${totalMin}</div>
      <div class="stat-label">Minutos entrenados</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${avgEnergy}</div>
      <div class="stat-label">Energía media /10</div>
    </div>
  `;
}

// ===== LOAD SESSION =====
function loadSession(id) {

        ${done ? '<span class="meta-badge" style="border-color:var(--green);color:var(--green);background:rgba(34,197,94,0.1)">✓ COMPLETADA</span>' : ''}

    </div>
    
    ${done && log ? `<div class="section-card" style="border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05)">

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;font-family:var(--font-mono);font-size:12px">

        <div><span style="color:var(--text3)">FECHA</span><br><span style="color:var(--text)">${log.date}</span></div>
      </div>

    </div>` : ''}

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'pre')">🔥 Pre-Entreno</button>
      <button class="tab-btn" onclick="switchTab(this,'workout')">💪 Entreno</button>
      <button class="tab-btn" onclick="switchTab(this,'post')">🧘 Post-Entreno</button>

    <!-- PRE TAB -->

    <!-- WORKOUT TAB -->
    <div class="tab-content" id="tab-workout">
      ${s.workout.blocks.map(bl => `
        <div class="block-title">${bl.name}</div>

                      <span class="img-icon">🖼</span> ${e.name}

                    <div class="ex-muscle">${e.muscle}</div>

                  <td><span class="ex-sets">${e.sets}</span></td>
                  <td><span class="ex-reps">${e.reps}</span></td>
                  <td><span class="ex-rest">${e.rest}</span></td>

                  <td><span class="ex-notes">${e.notes||'—'}</span></td>

              `).join('')}

      `).join('')}
    </div>

    <!-- POST TAB -->
    <div class="tab-content" id="tab-post">
      <div class="section-card">
        <div class="sc-label">Enfriamiento</div>
        ${s.post.cooldown.map(c => `<div class="info-item info-clickable" onclick="openExModal('post','${escStr(c)}','Enfriamiento','Sin equipamiento')"><span class="info-bullet">↓</span><span class="info-text">${c}</span><span class="img-icon">🖼</span></div>`).join('')}
      </div>
      <div class="section-card">
        <div class="sc-label">Estiramientos</div>
        ${s.post.stretches.map(st => `<div class="info-item info-clickable" onclick="openExModal('post','${escStr(st)}','Estiramiento','Colchoneta / Sin equipamiento')"><span class="info-bullet">~</span><span class="info-text">${st}</span><span class="img-icon">🖼</span></div>`).join('')}

    <!-- MARK DONE -->
    <div class="mark-section">
      ${done ? 
        `<button class="mark-btn already-done" disabled>✓ Sesión ya registrada</button>` :
        `<button class="mark-btn" onclick="openLogForm()">✓ Marcar como completada</button>`
      }

        </div>
        <div class="log-actions">

function buildPhaseIntro(phase) {
  const p = PHASES[phase];
  const phaseColors = {1:'var(--amber)',2:'var(--cyan)',3:'var(--red)',4:'var(--green)'};
  const color = phaseColors[phase];
  const pSessions = SESSIONS.filter(s => s.phase === phase);
  const done = pSessions.filter(s => isDone(s.id)).length;
  
  document.getElementById('phaseIntroBox').innerHTML = `
    <div class="phase-intro" style="border-color:${color}30">
      <div class="pi-phase" style="color:${color}">FASE ${phase}</div>
      <div class="pi-name" style="color:${color}">${p.name.split('—')[1]?.trim() || p.name}</div>
      <div class="pi-desc">${p.desc}</div>
      <div class="pi-stats">
        <div class="pi-stat"><div class="pi-stat-val" style="color:${color}">${p.weeks}</div><div class="pi-stat-label">Duración</div></div>
        <div class="pi-stat"><div class="pi-stat-val" style="color:${color}">${done}/${p.sessions.split(' ')[0]}</div><div class="pi-stat-label">Completadas</div></div>
      </div>
    </div>
  `;
}

// ===== TABS =====
function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const tab = document.getElementById('tab-'+tabId);
  if (tab) tab.classList.add('active');
}

// ===== LOG FORM =====
function openLogForm() {
  document.getElementById('logForm').classList.add('open');
}
function closeLogForm() {
  document.getElementById('logForm').classList.remove('open');
}
function saveLog() {
  const log = {
    sessionId: state.currentId,
    date: new Date().toLocaleDateString('es-CO'),
    duration: parseInt(document.getElementById('logDur').value)||70,
    energy: parseInt(document.getElementById('logEnergy').value)||7,
    fatigue: parseInt(document.getElementById('logFatigue').value)||6,
    pain: document.getElementById('logPain').value||'ninguna',
    notes: document.getElementById('logNotes').value||'',
  };
  state.logs = state.logs.filter(l => l.sessionId !== state.currentId);
  state.logs.push(log);
  saveState();
  buildStats();
  buildSidebar();
  loadSession(state.currentId);
}

// ===== EXERCISE MODAL =====
function openExModal(id, name, muscle, equip) {
  const modal = document.getElementById('exModalContent');
  const imgSrc = getExImage(id, name);
  const imgSection = imgSrc
    ? `<div class="ex-modal-img" style="padding:0;background:var(--bg2);height:auto">
        <img src="${imgSrc}" alt="${name}" style="width:100%;height:auto;display:block">
       </div>`
    : `<div class="ex-modal-img">
        <div class="ex-modal-img-placeholder">🏋️</div>
        <div class="ex-modal-img-text">${name}</div>
        <div class="ex-modal-img-soon">📸 Imagen del ejercicio — próximamente</div>
       </div>`;
  const bodyExtra = imgSrc ? '' : `
      <div style="font-size:12px;color:var(--text3);margin-top:12px;font-family:var(--font-mono);line-height:1.7">
        Al hacer clic en el ícono 🖼 de cualquier ejercicio podrás ver aquí la imagen y video demostrativo del movimiento.<br>
        <span style="color:var(--amber)">Esta función estará disponible en la próxima versión.</span>
      </div>`;
  modal.innerHTML = `
    ${imgSection}
    <div class="ex-modal-body">
      <div class="ex-modal-name">${name}</div>
      <div class="ex-modal-muscle">💪 ${muscle}</div>
      <div class="ex-modal-equip">🔧 ${equip}</div>
      ${bodyExtra}
    </div>
  `;
  document.getElementById('exModal').classList.add('open');
}
function closeExModal() {
  document.getElementById('exModal').classList.remove('open');
}

// ===== HELPERS =====
function escStr(str) {
  return (str||'').replace(/'/g,"\'").replace(/"/g,"&quot;");
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== INIT =====
buildStats();
buildSidebar();
</script>
